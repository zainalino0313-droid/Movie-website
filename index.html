<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Laib - Netflix Style</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#141414;
    color:white;
}

/* Header */
header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:black;
}

.logo {
    color:red;
    font-size:22px;
    font-weight:bold;
}

input {
    padding:7px;
    width:200px;
    border-radius:5px;
    border:none;
}

/* Category */
.section {
    padding:15px;
}

.section h2 {
    margin-bottom:10px;
}

/* Movie row */
.row {
    display:flex;
    overflow-x:auto;
}

.card {
    min-width:150px;
    margin-right:10px;
    cursor:pointer;
}

.card img {
    width:100%;
    border-radius:5px;
}

/* Modal Player */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal iframe {
    width:80%;
    height:400px;
}

.close {
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo">🎬 Movie Laib</div>
    <input type="text" placeholder="Search..." onkeyup="searchMovie(this.value)">
</header>

<!-- Categories -->

<div class="section">
<h2>🔥 Trending</h2>
<div class="row" id="trending"></div>
</div>

<div class="section">
<h2>😂 Comedy</h2>
<div class="row" id="comedy"></div>
</div>

<div class="section">
<h2>💥 Action</h2>
<div class="row" id="action"></div>
</div>

<!-- Player Modal -->
<div class="modal" id="modal">
    <span class="close" onclick="closePlayer()">✖</span>
    <iframe id="player" src="" allowfullscreen></iframe>
</div>

<script>
const movies = [
    {title:"Movie 1", cat:"trending", img:"https://via.placeholder.com/150x220", link:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
    {title:"Funny Show", cat:"comedy", img:"https://via.placeholder.com/150x220", link:"https://www.youtube.com/embed/3JZ_D3ELwOQ"},
    {title:"Action Blast", cat:"action", img:"https://via.placeholder.com/150x220", link:"https://www.youtube.com/embed/tgbNymZ7vqY"},
    {title:"Comedy 2", cat:"comedy", img:"https://via.placeholder.com/150x220", link:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
    {title:"Trending 2", cat:"trending", img:"https://via.placeholder.com/150x220", link:"https://www.youtube.com/embed/3JZ_D3ELwOQ"}
];

function loadMovies() {
    movies.forEach(m => {
        let card = document.createElement("div");
        card.className="card";
        card.innerHTML = `<img src="${m.img}"><p>${m.title}</p>`;
        card.onclick = () => playMovie(m.link);

        document.getElementById(m.cat).appendChild(card);
    });
}

function playMovie(link){
    document.getElementById("modal").style.display="flex";
    document.getElementById("player").src=link;
}

function closePlayer(){
    document.getElementById("modal").style.display="none";
    document.getElementById("player").src="";
}

function searchMovie(text){
    text = text.toLowerCase();
    document.querySelectorAll(".card").forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(text) ? "block" : "none";
    });
}

loadMovies();
</script>

</body>
</html>
